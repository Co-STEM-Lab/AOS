<!DOCTYPE html>
<html lang="en" data-theme="dark-matter">
<head>

<script>
// 主题初始化：从 localStorage 读取，在页面渲染前生效
(function() {
  var theme = localStorage.getItem('aos-theme') || 'dark-matter';
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</head>
<body>

<!-- ─── 导航栏 ─── -->
<nav class="navbar" role="navigation">
  <div class="nav-inner">
    <a href="/AOS/en/" class="nav-brand">Chenguisen</a>
    <button class="nav-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      
      <li><a href="/AOS/en/"
             class="nav-link ">Home</a></li>
      
      <li><a href="/AOS/en/publications/"
             class="nav-link ">Publications</a></li>
      
      <li><a href="/AOS/en/projects/"
             class="nav-link active">Projects</a></li>
      
      <li class="nav-lang">
        <a href="/AOS/" class="nav-lang-btn">中</a>
      </li>
      <li>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Switch theme" title="Switch theme">
          <span class="theme-icon-dark">🌌</span>
          <span class="theme-icon-amber">🔥</span>
        </button>
      </li>
    </ul>
  </div>
</nav>

<!-- ─── 主内容 ─── -->
<main class="main-content">
  
<section class="section page-header">
  <h1>Projects</h1>

</section>

  <h2 class="bucket-title">🔬 Active</h2>
  
  <p class="empty-state">No active projects</p>
  
</section>

<!-- 想法 -->
<section class="section">
  <h2 class="bucket-title">💡 Ideas</h2>
  
  <p class="empty-state">No ideas yet</p>
  
</section>

<!-- 已完成 -->
<section class="section">
  <h2 class="bucket-title">✅ Completed</h2>
  
  <p class="empty-state">No completed projects</p>
  
</section>

</main>

<!-- ─── 页脚 ─── -->

<!-- 返回顶部 -->
<a href="#" class="back-to-top" title="Back to top">↑</a>

<script>
// 返回顶部按钮
window.addEventListener('scroll', function() {
  document.querySelector('.back-to-top').classList.toggle('visible', window.scrollY > 400);
});

// 主题切换
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme') || 'dark-matter';
  var next = current === 'dark-matter' ? 'amber-haze' : 'dark-matter';
  html.setAttribute('data-theme', next);
  localStorage.setItem('aos-theme', next);
}
</script>
</body>
</html>
