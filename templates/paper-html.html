<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
/* AOS 学术输出排版 —— A4 纸，适合打印/导出 PDF */
/* 用法：render.py 自动注入此 CSS */

@media print {
  @page {
    size: A4;
    margin: 25mm 20mm 25mm 20mm;
    @bottom-center {
      content: counter(page);
      font-family: "Source Serif 4", "Noto Serif CJK SC", serif;
      font-size: 9pt;
      color: #666;
    }
  }
  body { margin: 0; padding: 0; }
}

/* ── 页面基础 ── */
body {
  max-width: 170mm;            /* A4 宽 210mm - 左右各 20mm */
  margin: 0 auto;
  padding: 25mm 0;
  font-family: "Source Serif 4", "Noto Serif CJK SC", "STSong", "SimSun", serif;
  font-size: 11pt;
  line-height: 1.8;
  color: #1a1a1a;
  background: #fff;
}

/* ── 标题层级 ── */
h1 {
  font-family: "Source Sans 3", "Noto Sans CJK SC", "STHeiti", "SimHei", sans-serif;
  font-size: 16pt;
  font-weight: 700;
  text-align: center;
  margin: 0 0 24pt 0;
  page-break-before: avoid;
  page-break-after: avoid;
}

h2 {
  font-family: "Source Sans 3", "Noto Sans CJK SC", sans-serif;
  font-size: 13pt;
  font-weight: 600;
  margin: 20pt 0 10pt 0;
  border-bottom: 0.5pt solid #333;
  padding-bottom: 4pt;
  page-break-after: avoid;
}

h3 {
  font-family: "Source Sans 3", "Noto Sans CJK SC", sans-serif;
  font-size: 12pt;
  font-weight: 600;
  margin: 16pt 0 8pt 0;
  page-break-after: avoid;
}

h4 {
  font-family: "Source Sans 3", "Noto Sans CJK SC", sans-serif;
  font-size: 11pt;
  font-weight: 600;
  font-style: italic;
  margin: 12pt 0 6pt 0;
}

/* ── 段落 ── */
p {
  margin: 0 0 8pt 0;
  text-indent: 2em;
  text-align: justify;
  hyphens: auto;
}

p:first-of-type { text-indent: 0; }  /* 首段不缩进 */

/* ── 摘要 ── */
.abstract {
  font-size: 10pt;
  margin: 12pt 0 18pt 0;
  padding: 8pt 12pt;
  border-left: 2pt solid #555;
  background: #f9f9f9;
}
.abstract p { text-indent: 0; }

/* ── 列表 ── */
ul, ol { margin: 4pt 0 8pt 0; padding-left: 2em; }
li { margin: 2pt 0; }

/* ── 表格 ── */
table {
  width: 100%;
  margin: 10pt 0;
  border-collapse: collapse;
  font-size: 10pt;
}
th {
  background: #f0f0f0;
  font-weight: 600;
  text-align: left;
  padding: 4pt 6pt;
  border-bottom: 1pt solid #333;
}
td {
  padding: 3pt 6pt;
  border-bottom: 0.3pt solid #ddd;
}

/* ── 图表 ── */
figure {
  margin: 12pt 0;
  text-align: center;
  page-break-inside: avoid;
}
figure img { max-width: 100%; }
figcaption {
  font-size: 9pt;
  color: #555;
  margin-top: 4pt;
}

/* ── 代码 / 数学 ── */
code {
  font-family: "Source Code Pro", "Cascadia Code", "Fira Code", monospace;
  font-size: 9pt;
  background: #f5f5f5;
  padding: 1pt 3pt;
  border-radius: 2pt;
}
pre {
  font-size: 9pt;
  line-height: 1.4;
  background: #f5f5f5;
  padding: 8pt 10pt;
  overflow-x: auto;
  border: 0.3pt solid #e0e0e0;
  page-break-inside: avoid;
}
pre code { background: none; padding: 0; }

/* ── 引用 ── */
blockquote {
  margin: 8pt 0;
  padding: 4pt 12pt;
  border-left: 2pt solid #ccc;
  color: #555;
  font-style: italic;
}

/* ── 分页 ── */
.page-break { page-break-before: always; }

/* ── 脚注 / 参考文献 ── */
.footnotes { font-size: 9pt; border-top: 0.5pt solid #999; padding-top: 8pt; }
.references { font-size: 10pt; }
.references li { margin: 3pt 0; }

/* ── 作者信息 ── */
.authors {
  text-align: center;
  font-size: 11pt;
  margin: 0 0 8pt 0;
}
.affiliation {
  text-align: center;
  font-size: 9pt;
  color: #666;
  margin: 0 0 16pt 0;
}

/* ── 关键词 ── */
.keywords {
  font-size: 10pt;
  margin: 0 0 16pt 0;
}
.keywords strong { font-weight: 600; }

/* ── 响应式（屏幕阅读） ── */
@media screen {
  body {
    background: #fafafa;
    padding: 40px 0;
  }
  body > .page {
    background: #fff;
    box-shadow: 0 0 12px rgba(0,0,0,0.1);
    padding: 25mm 20mm;
    max-width: 210mm;
    margin: 0 auto;
    min-height: 297mm;
  }
}
</style>
<!-- MathJax: $...$ and $$...$$ rendering -->
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']],
    processEscapes: true
  },
  options: { ignoreHtmlClass: 'no-math' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="page">
  <header>
    <h1>{{title}}</h1>
    <p class="authors">{{authors}}</p>
    <p class="affiliation">{{affiliation}}</p>
    <div class="abstract">
      <p>{{abstract}}</p>
    </div>
    <p class="keywords"><strong>关键词：</strong>{{keywords}}</p>
  </header>
  <div class="content">
    {{body}}
  </div>
</div>
</body>
</html>
