<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<link rel="stylesheet" href="output.css">
<!-- MathJax: $...$ and $$...$$ rendering -->
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']],
    processEscapes: true
  },
  options: { ignoreHtmlClass: 'no-math' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="page">
  <header>
    <h1>{{title}}</h1>
    <p class="authors">{{authors}}</p>
    <p class="affiliation">{{affiliation}}</p>
    <div class="abstract">
      <p>{{abstract}}</p>
    </div>
    <p class="keywords"><strong>关键词：</strong>{{keywords}}</p>
  </header>
  <div class="content">
    {{body}}
  </div>
</div>
</body>
</html>
