                    <p>会聚束电子衍射&#xff08;CBED&#xff09;是将具有足够大会聚角的电子東会聚到试样上&#xff0c;将物镜后焦面上的透射斑点和衍射斑点扩展成一个个衍射盘。试样的结构信息反映在圆盘中的各种衬度花样上。</p> 
<p>CBED的应用领域:晶体对称性(包括晶体点群、空间群)、晶体点阵参数、薄晶片厚度和品体势函数、晶体和准晶体中位错b矢量的测定&#xff0c;以及材料应变场研究。</p>
